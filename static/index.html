<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGX Trading Bot</title>
<style>
:root {
  --bg:        #0d1117;
  --surface:   #161b22;
  --surface2:  #1c2230;
  --border:    #21262d;
  --border2:   #30363d;
  --text:      #e6edf3;
  --muted:     #8b949e;
  --accent:    #1f6feb;
  --buy:       #2ea043;
  --buy-bg:    rgba(46,160,67,.12);
  --sell:      #da3633;
  --sell-bg:   rgba(218,54,51,.12);
  --hold:      #e3b341;
  --hold-bg:   rgba(227,179,65,.12);
  --watch:     #388bfd;
  --watch-bg:  rgba(56,139,253,.12);
  --radius:    8px;
  --shadow:    0 2px 8px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── navbar ── */
nav{display:flex;align-items:center;gap:12px;padding:0 20px;height:52px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:100}
nav .logo{font-weight:700;font-size:15px;letter-spacing:.3px;white-space:nowrap}
nav .logo span{color:var(--accent)}
.ws-dot{width:8px;height:8px;border-radius:50%;background:#555;flex-shrink:0;transition:background .3s}
.ws-dot.connected{background:var(--buy)}
.ws-dot.connecting{background:var(--hold);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ws-label{font-size:12px;color:var(--muted)}
nav .spacer{flex:1}
.tg-wrap{display:flex;align-items:center;gap:8px;font-size:13px}
.toggle{position:relative;width:40px;height:22px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#30363d;border-radius:22px;transition:.25s}
.toggle-slider:before{content:'';position:absolute;width:16px;height:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.25s}
.toggle input:checked+.toggle-slider{background:var(--accent)}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px)}
.nav-divider{width:1px;height:22px;background:var(--border2);flex-shrink:0}
.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .15s,border-color .15s;white-space:nowrap}
.btn:hover{background:#21262d;border-color:var(--accent)}
.btn:active{transform:scale(.98)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:#388bfd}
.btn.danger{background:rgba(218,54,51,.15);border-color:var(--sell);color:var(--sell)}
.btn.danger:hover{background:rgba(218,54,51,.28)}
.btn.success{background:rgba(46,160,67,.15);border-color:var(--buy);color:var(--buy)}
.btn.success:hover{background:rgba(46,160,67,.28)}
.btn.spinning .icon{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── layout ── */
.layout{display:flex;flex:1;overflow:hidden}

/* ── sidebar ── */
aside{width:270px;min-width:270px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.aside-header{padding:14px 16px 10px;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border)}
.search-wrap{padding:10px 12px;position:relative}
.search-wrap input{width:100%;padding:7px 10px 7px 32px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:13px;outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap .search-icon{position:absolute;left:20px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
.autocomplete{position:absolute;top:calc(100% - 4px);left:12px;right:12px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;z-index:200;overflow:hidden;box-shadow:var(--shadow);display:none}
.autocomplete.open{display:block}
.ac-item{padding:8px 12px;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.ac-item:hover{background:var(--surface)}
.ac-item .ac-ticker{font-weight:600;color:var(--accent);font-size:12px;flex-shrink:0;margin-left:8px}
.ac-item .ac-name{color:var(--muted);font-size:12px;text-overflow:ellipsis;overflow:hidden;white-space:nowrap}
.wl-list{flex:1;overflow-y:auto;padding:0 0 8px}
.wl-empty{padding:20px 16px;text-align:center;color:var(--muted);font-size:13px;line-height:1.6}
.wl-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);transition:background .1s}
.wl-item:hover{background:var(--surface2)}
.wl-ticker{font-weight:700;font-size:13px;color:var(--accent);min-width:42px}
.wl-name{flex:1;font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wl-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:2px 4px;border-radius:4px;line-height:1;transition:color .1s,background .1s}
.wl-remove:hover{color:var(--sell);background:var(--sell-bg)}
.wl-footer{padding:10px 12px;border-top:1px solid var(--border)}

/* ── main ── */
main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tabs-row{display:flex;align-items:stretch;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.tabs{display:flex;gap:0;flex:1}
.tab{padding:12px 16px;font-size:13px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.tab .count{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:9px;background:var(--surface2);color:var(--muted);font-size:11px;padding:0 5px;margin-left:6px}
.tab.active .count{background:var(--accent);color:#fff}
.tab-actions{display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0}

/* status bar */
.status-bar{display:flex;align-items:center;gap:8px;padding:6px 20px;font-size:12px;color:var(--muted);background:var(--bg);border-bottom:1px solid var(--border);min-height:30px;flex-shrink:0}
.status-bar .spinner{display:none;width:12px;height:12px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
.status-bar.busy .spinner{display:block}

/* signals grid */
.signals-wrap{flex:1;overflow-y:auto;padding:16px 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;align-content:start}
.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state .icon{font-size:40px;margin-bottom:12px}
.empty-state p{font-size:14px;line-height:1.6}

/* signal card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card.new{animation:newCard .4s ease}
@keyframes newCard{0%{opacity:0;transform:translateY(-8px);box-shadow:0 0 0 2px var(--accent)}50%{box-shadow:0 0 0 2px var(--accent)}100%{opacity:1;transform:translateY(0);box-shadow:var(--shadow)}}
.card-top{height:3px}
.card.buy .card-top{background:var(--buy)}.card.sell .card-top{background:var(--sell)}.card.hold .card-top{background:var(--hold)}.card.watch .card-top{background:var(--watch)}
.card-head{display:flex;align-items:flex-start;gap:8px;padding:12px 14px 8px}
.action-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:.3px;white-space:nowrap}
.card.buy .action-badge{background:var(--buy-bg);color:var(--buy)}.card.sell .action-badge{background:var(--sell-bg);color:var(--sell)}.card.hold .action-badge{background:var(--hold-bg);color:var(--hold)}.card.watch .action-badge{background:var(--watch-bg);color:var(--watch)}
.card-title{flex:1;min-width:0}.card-ticker{font-size:16px;font-weight:700}.card-name{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.source-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px}
.source-badge.watchlist{background:rgba(31,111,235,.2);color:var(--accent)}.source-badge.scheduled{background:var(--surface2);color:var(--muted)}
.card-time{font-size:11px;color:var(--muted)}
.card-prices{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.price-cell{padding:8px 10px;text-align:center}.price-cell+.price-cell{border-left:1px solid var(--border)}
.price-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.price-val{font-size:13px;font-weight:600}.price-pct{font-size:10px;margin-top:1px}.price-pct.pos{color:var(--buy)}.price-pct.neg{color:var(--sell)}
.conf-row{padding:8px 14px;display:flex;align-items:center;gap:10px}
.conf-bar-wrap{flex:1;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.conf-bar{height:100%;border-radius:2px;transition:width .4s}
.card.buy .conf-bar{background:var(--buy)}.card.sell .conf-bar{background:var(--sell)}.card.hold .conf-bar{background:var(--hold)}.card.watch .conf-bar{background:var(--watch)}
.conf-label{font-size:12px;font-weight:600;min-width:34px;text-align:right}
.strategy-row{padding:0 14px 8px;display:flex;gap:6px;flex-wrap:wrap}
.strategy-tag{font-size:11px;padding:2px 8px;border-radius:4px;background:var(--surface2);color:var(--muted);text-transform:capitalize;border:1px solid var(--border2)}
.card-reasoning{padding:8px 14px 10px;font-size:12px;color:var(--muted);line-height:1.55;border-top:1px solid var(--border)}
.card-footer{padding:6px 14px;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);border-top:1px solid var(--border)}
.card-footer .news-src{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}

/* ── Fundamentals modal ── */
.fund-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.fund-overlay.open{display:flex}
.fund-modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);width:min(860px,96vw);max-height:90vh;display:flex;flex-direction:column;box-shadow:0 16px 48px rgba(0,0,0,.6);animation:fadeIn .2s ease}
.fund-modal-head{display:flex;align-items:flex-start;gap:12px;padding:18px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.fund-ticker-big{font-size:22px;font-weight:800;color:var(--accent)}
.fund-company{font-size:14px;font-weight:600;color:var(--text);margin-top:2px}
.fund-sector{font-size:12px;color:var(--muted);margin-top:2px}
.fund-head-right{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.fund-score{display:flex;align-items:center;gap:8px}
.fund-score-label{font-size:11px;color:var(--muted)}
.fund-score-val{font-size:20px;font-weight:800}
.fund-score-val.high{color:var(--buy)}.fund-score-val.mid{color:var(--hold)}.fund-score-val.low{color:var(--sell)}
.fund-price-row{font-size:12px;color:var(--muted)}
.fund-close-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;padding:4px 8px;border-radius:4px;line-height:1;transition:color .1s;flex-shrink:0}
.fund-close-btn:hover{color:var(--text);background:var(--surface2)}
.fund-modal-body{overflow-y:auto;padding:16px 20px;flex:1}
.fund-section{margin-bottom:20px}
.fund-section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.fund-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1px;background:var(--border);border-radius:6px;overflow:hidden}
.fund-cell{background:var(--surface2);padding:11px 14px;display:flex;flex-direction:column;gap:3px}
.fund-cell-label{font-size:11px;color:var(--muted);font-weight:500}
.fund-cell-val{font-size:15px;font-weight:700;color:var(--text)}
.fund-cell-val.pos{color:var(--buy)}.fund-cell-val.neg{color:var(--sell)}.fund-cell-val.muted{color:var(--muted)}
.fund-cell-sub{font-size:11px;color:var(--muted)}
.fund-bar-wrap{margin-top:4px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.fund-bar{height:100%;border-radius:2px;background:var(--accent)}
.fund-loading{text-align:center;padding:48px;color:var(--muted);font-size:14px}
.fund-error{text-align:center;padding:36px;color:var(--sell);font-size:13px}
.fund-refresh-btn{font-size:11px;color:var(--accent);background:none;border:none;cursor:pointer;padding:2px 4px;text-decoration:underline}
/* 📊 button on watchlist items */
.wl-fund-btn{background:none;border:1px solid var(--border2);color:var(--muted);cursor:pointer;font-size:11px;padding:2px 5px;border-radius:4px;line-height:1.4;transition:color .1s,border-color .1s,background .1s;flex-shrink:0}
.wl-fund-btn:hover{color:var(--accent);border-color:var(--accent);background:rgba(31,111,235,.1)}

/* scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

@media(max-width:700px){
  aside{width:220px;min-width:220px}
  .signals-wrap{grid-template-columns:1fr;padding:10px}
}
</style>
</head>
<body>

<!-- ── Navbar ── -->
<nav>
  <div class="logo">📈 <span>SGX</span> Trading Bot</div>
  <div class="ws-dot" id="wsDot"></div>
  <div class="ws-label" id="wsLabel">Connecting…</div>
  <div class="spacer"></div>
  <div class="tg-wrap">
    <span>Telegram</span>
    <label class="toggle" title="Send watchlist signals to Telegram">
      <input type="checkbox" id="tgToggle">
      <span class="toggle-slider"></span>
    </label>
  </div>
  <div class="nav-divider"></div>
  <button class="btn danger" id="stopBtn" title="Stop all bot activity">
    <span>⏹</span> Stop Bot
  </button>
  <a href="/config" class="btn" style="text-decoration:none" title="Open configuration page">⚙</a>
</nav>

<!-- ── Body ── -->
<div class="layout">

  <!-- ── Sidebar ── -->
  <aside>
    <div class="aside-header">Watchlist</div>
    <div class="search-wrap" id="searchWrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search ticker or name…" autocomplete="off">
      <div class="autocomplete" id="acDropdown"></div>
    </div>
    <div class="wl-list" id="wlList">
      <div class="wl-empty">No stocks in watchlist.<br>Search above to add one.</div>
    </div>
    <div class="wl-footer">
      <div style="font-size:11px;color:var(--muted);text-align:center" id="wlFooter">0 stocks · analysed hourly</div>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main>
    <!-- Tabs row -->
    <div class="tabs-row">
      <div class="tabs">
        <div class="tab active" data-tab="all">All Signals <span class="count" id="cntAll">0</span></div>
        <div class="tab" data-tab="watchlist">Watchlist <span class="count" id="cntWl">0</span></div>
        <div class="tab" data-tab="scheduled">Scheduled <span class="count" id="cntSched">0</span></div>
      </div>
      <div class="tab-actions">
        <button class="btn primary" id="analyzeBtn"          style="display:none"><span class="icon">▶</span> Analyse Now</button>
        <button class="btn"         id="refreshScheduledBtn" style="display:none"><span class="icon">🔄</span> Refresh Now</button>
      </div>
    </div>

    <!-- Status bar -->
    <div class="status-bar" id="statusBar">
      <div class="spinner"></div>
      <span id="statusMsg">Ready</span>
    </div>

    <!-- Signals grid (hidden when Config tab active) -->
    <div class="signals-wrap" id="signalsGrid">
      <div class="empty-state">
        <div class="icon">📊</div>
        <p>No signals yet.<br>Signals appear here as the bot runs.</p>
      </div>
    </div>

  </main>
</div>

<!-- ── Fundamentals Modal ── -->
<div class="fund-overlay" id="fundOverlay">
  <div class="fund-modal" id="fundModal">
    <div class="fund-modal-head" id="fundHead">
      <div>
        <div class="fund-ticker-big" id="fundTicker">—</div>
        <div class="fund-company"   id="fundCompany"></div>
        <div class="fund-sector"    id="fundSector"></div>
      </div>
      <div class="fund-head-right">
        <div class="fund-score">
          <span class="fund-score-label">Quality Score</span>
          <span class="fund-score-val" id="fundScore">—</span>
        </div>
        <div class="fund-price-row" id="fundPriceRow"></div>
      </div>
      <button class="fund-close-btn" id="fundCloseBtn" title="Close">✕</button>
    </div>
    <div class="fund-modal-body" id="fundBody">
      <div class="fund-loading">Loading fundamentals…</div>
    </div>
  </div>
</div>

<script>
/* ──────────────────────────────────────────────────────────────
   State
────────────────────────────────────────────────────────────── */
const state = {
  signals:    [],
  watchlist:  [],
  settings:   { telegram_enabled: true, watchlist_interval_hours: 1 },
  activeTab:  'all',
  ws:         null,
  wsRetry:    0,
  acResults:  [],
  analyzing:  false,
  refreshing: false,
  botStopped: false,
  status: {
    all:       { msg: 'Ready', busy: false },
    watchlist: { msg: 'Ready', busy: false },
    scheduled: { msg: 'No scheduled run yet', busy: false },
  },
};

const $ = id => document.getElementById(id);

/* ──────────────────────────────────────────────────────────────
   Status bar — tab-aware
────────────────────────────────────────────────────────────── */
function setStatus(msg, busy = false, tab = null) {
  const t = tab || state.activeTab;
  state.status[t] = { msg, busy };
  if (!tab) state.status.all = { msg, busy };
  syncStatusBar();
}
function setScheduledStatus(msg, busy = false) {
  state.status.scheduled = { msg, busy };
  syncStatusBar();
}
function syncStatusBar() {
  const s = state.status[state.activeTab] || state.status.all;
  $('statusMsg').textContent = s.msg || '';
  $('statusBar').classList.toggle('busy', !!s.busy);
}

/* ──────────────────────────────────────────────────────────────
   Tab switching
────────────────────────────────────────────────────────────── */
function syncTabUI() {
  const t = state.activeTab;
  $('analyzeBtn').style.display          = t === 'watchlist' ? 'inline-flex' : 'none';
  $('refreshScheduledBtn').style.display = t === 'scheduled' ? 'inline-flex' : 'none';
  syncStatusBar();
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    state.activeTab = tab.dataset.tab;
    renderSignals();
    syncTabUI();
  });
});

/* ──────────────────────────────────────────────────────────────
   Utilities
────────────────────────────────────────────────────────────── */
function fmtTime(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso), now = new Date(), diff = (now - d) / 1000;
    if (diff < 60)   return 'just now';
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return d.toLocaleDateString();
  } catch { return ''; }
}
function fmtPrice(p) { return p == null ? '—' : `S$${Number(p).toFixed(3)}`; }
function fmtPct(entry, price) {
  if (entry == null || price == null) return '';
  const pct = (price - entry) / entry * 100;
  return (pct >= 0 ? '+' : '') + pct.toFixed(1) + '%';
}
function actionClass(a) { return {BUY:'buy',SELL:'sell',HOLD:'hold',WATCH:'watch'}[a]||'watch'; }
function actionEmoji(a) { return {BUY:'🟢',SELL:'🔴',HOLD:'🟡',WATCH:'👀'}[a]||'⚪'; }

/* ──────────────────────────────────────────────────────────────
   Signal cards
────────────────────────────────────────────────────────────── */
function renderCard(sig, isNew = false) {
  const cls = actionClass(sig.action), emoji = actionEmoji(sig.action);
  const hasPrices = sig.entry_price != null;
  const src = sig.ui_source === 'watchlist' ? 'watchlist' : 'scheduled';
  const srcLbl = src === 'watchlist' ? '👁 Watchlist' : '🕐 Scheduled';

  const priceCells = hasPrices ? `
    <div class="card-prices">
      <div class="price-cell"><div class="price-label">Entry</div><div class="price-val">${fmtPrice(sig.entry_price)}</div></div>
      <div class="price-cell"><div class="price-label">Target</div><div class="price-val">${fmtPrice(sig.target_price)}</div><div class="price-pct pos">${fmtPct(sig.entry_price,sig.target_price)}</div></div>
      <div class="price-cell"><div class="price-label">Stop</div><div class="price-val">${fmtPrice(sig.stop_loss)}</div><div class="price-pct neg">${fmtPct(sig.entry_price,sig.stop_loss)}</div></div>
      <div class="price-cell"><div class="price-label">Conf</div><div class="price-val">${Math.round((sig.confidence||0)*100)}%</div></div>
    </div>` : `
    <div class="card-prices">
      <div class="price-cell" style="grid-column:1/-1"><div class="price-label">Confidence</div><div class="price-val">${Math.round((sig.confidence||0)*100)}%</div></div>
    </div>`;

  const div = document.createElement('div');
  div.className = `card ${cls}${isNew ? ' new' : ''}`;
  div.dataset.ticker = sig.ticker;
  div.dataset.source = sig.ui_source || 'scheduled';
  div.innerHTML = `
    <div class="card-top"></div>
    <div class="card-head">
      <div><div class="action-badge">${emoji} ${sig.action}</div></div>
      <div class="card-title">
        <div class="card-ticker">${sig.ticker}</div>
        <div class="card-name">${sig.name||''}</div>
      </div>
      <div class="card-meta">
        <span class="source-badge ${src}">${srcLbl}</span>
        <span class="card-time">${fmtTime(sig.received_at)}</span>
      </div>
    </div>
    ${priceCells}
    <div class="conf-row">
      <div class="conf-bar-wrap"><div class="conf-bar" style="width:${Math.round((sig.confidence||0)*100)}%"></div></div>
      <span class="conf-label">${Math.round((sig.confidence||0)*100)}%</span>
    </div>
    ${sig.strategy ? `<div class="strategy-row"><span class="strategy-tag">${sig.strategy.replace(/_/g,' ')}</span></div>` : ''}
    ${sig.reasoning ? `<div class="card-reasoning">${sig.reasoning}</div>` : ''}
    ${sig.news_sources?.length ? `<div class="card-footer"><span>⚡</span><span class="news-src">${sig.news_sources.join(' · ')}</span></div>` : ''}
  `;
  return div;
}

function filteredSignals() {
  if (state.activeTab === 'watchlist')  return state.signals.filter(s => s.ui_source === 'watchlist');
  if (state.activeTab === 'scheduled') return state.signals.filter(s => s.ui_source !== 'watchlist');
  return state.signals;
}

function renderSignals() {
  const grid = $('signalsGrid'), list = filteredSignals();
  updateCounts();
  if (!list.length) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">📊</div><p>
      No ${state.activeTab === 'all' ? '' : state.activeTab + ' '}signals yet.<br>
      ${state.activeTab === 'watchlist' ? 'Add stocks to the watchlist and click <b>Analyse Now</b>.'
        : state.activeTab === 'scheduled' ? 'Click <b>Refresh Now</b> or wait for the next scheduled run.'
        : 'Signals will appear here when the bot runs.'}</p></div>`;
    return;
  }
  grid.innerHTML = '';
  list.forEach(sig => grid.appendChild(renderCard(sig)));
}

function prependSignal(sig) {
  state.signals.unshift(sig);
  if (state.signals.length > 200) state.signals.pop();
  const list = filteredSignals();
  if (!list.includes(sig)) { updateCounts(); return; }
  const grid = $('signalsGrid');
  grid.querySelector('.empty-state')?.remove();
  grid.insertBefore(renderCard(sig, true), grid.firstChild);
  updateCounts();
}

function updateCounts() {
  $('cntAll').textContent   = state.signals.length;
  $('cntWl').textContent    = state.signals.filter(s => s.ui_source === 'watchlist').length;
  $('cntSched').textContent = state.signals.filter(s => s.ui_source !== 'watchlist').length;
}

/* ──────────────────────────────────────────────────────────────
   Watchlist sidebar
────────────────────────────────────────────────────────────── */
function renderWatchlist() {
  const list = $('wlList'), n = state.watchlist.length;
  const footer = $('wlFooter');
  if (!footer.textContent.includes('last run'))
    footer.textContent = `${n} stock${n===1?'':'s'} · analysed hourly`;
  else
    footer.textContent = footer.textContent.replace(/^\d+ stock[s]?/, `${n} stock${n===1?'':'s'}`);
  if (!n) { list.innerHTML = `<div class="wl-empty">No stocks in watchlist.<br>Search above to add one.</div>`; return; }
  list.innerHTML = '';
  state.watchlist.forEach(w => {
    const div = document.createElement('div');
    div.className = 'wl-item';
    div.innerHTML = `<span class="wl-ticker">${w.ticker}</span><span class="wl-name" title="${w.name}">${w.name}</span><button class="wl-fund-btn" data-ticker="${w.ticker}" title="Fundamental analysis">📊</button><button class="wl-remove" data-ticker="${w.ticker}" title="Remove">✕</button>`;
    list.appendChild(div);
  });
}

/* ──────────────────────────────────────────────────────────────
   WebSocket
────────────────────────────────────────────────────────────── */
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws`);
  state.ws = ws;
  const dot = $('wsDot'), label = $('wsLabel');
  dot.className = 'ws-dot connecting'; label.textContent = 'Connecting…';

  ws.onopen = () => { dot.className = 'ws-dot connected'; label.textContent = 'Live'; state.wsRetry = 0; setStatus('Connected — live updates active'); };

  ws.onmessage = e => {
    let msg; try { msg = JSON.parse(e.data); } catch { return; }
    const { type, data } = msg;
    if (type === 'ping') { return; }
    if (type === 'signal') { prependSignal(data); }
    else if (type === 'clear_watchlist') { state.signals = state.signals.filter(s => s.ui_source !== 'watchlist'); renderSignals(); }
    else if (type === 'status') {
      setStatus(data.message||'', !!data.in_progress, 'watchlist');
      setStatus(data.message||'', !!data.in_progress, 'all');
      if (!data.in_progress) {
        const btn = $('analyzeBtn'); btn.classList.remove('spinning'); btn.disabled = false; state.analyzing = false;
        if (data.finished_at) { const n=state.watchlist.length; $('wlFooter').textContent=`${n} stock${n===1?'':'s'} · last run ${data.finished_at}`; }
      }
      if (state.activeTab !== 'scheduled') syncStatusBar();
    }
    else if (type === 'scheduled_status') {
      setScheduledStatus(data.message||'', !!data.in_progress);
      if (!data.in_progress) { const b=$('refreshScheduledBtn'); b.classList.remove('spinning'); b.disabled=false; state.refreshing=false; }
    }
    else if (type === 'watchlist_updated') { state.watchlist = data.watchlist||[]; renderWatchlist(); }
    else if (type === 'settings_updated') { state.settings = data; $('tgToggle').checked = !!data.telegram_enabled; }
    else if (type === 'bot_status') { setBotStopped(data.stopped); }
  };

  ws.onclose = () => {
    state.wsRetry++;
    if (state.wsRetry > 6) {
      dot.className = 'ws-dot'; label.textContent = 'Offline';
      setStatus('WebSocket offline — reload the page to reconnect');
      return;
    }
    dot.className = 'ws-dot'; label.textContent = 'Disconnected';
    setStatus('Reconnecting…');
    const delay = Math.min(1000 * 2 ** state.wsRetry, 16000);
    setTimeout(connectWS, delay);
  };
  ws.onerror = () => ws.close();
}

/* ──────────────────────────────────────────────────────────────
   API
────────────────────────────────────────────────────────────── */
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  return r.json();
}

/* ──────────────────────────────────────────────────────────────
   Autocomplete
────────────────────────────────────────────────────────────── */
let acTimer = null;
const searchInput = $('searchInput'), acDropdown = $('acDropdown');
searchInput.addEventListener('input', () => {
  clearTimeout(acTimer);
  const q = searchInput.value.trim();
  if (!q) { acDropdown.classList.remove('open'); return; }
  acTimer = setTimeout(() => fetchAC(q), 200);
});
searchInput.addEventListener('keydown', e => { if (e.key==='Escape') { acDropdown.classList.remove('open'); searchInput.value=''; } });
async function fetchAC(q) {
  try { const r = await api('GET', `/api/stocks/search?q=${encodeURIComponent(q)}`); renderAC(r); }
  catch { acDropdown.classList.remove('open'); }
}
function renderAC(results) {
  if (!results.length) { acDropdown.classList.remove('open'); return; }
  acDropdown.innerHTML = '';
  results.slice(0,10).forEach(r => {
    const div = document.createElement('div');
    div.className = 'ac-item';
    div.innerHTML = `<span class="ac-name">${r.name||r.ticker}</span><span class="ac-ticker">${r.ticker}</span>`;
    div.addEventListener('mousedown', e => { e.preventDefault(); addToWatchlist(r.ticker, r.name||r.ticker); });
    acDropdown.appendChild(div);
  });
  acDropdown.classList.add('open');
}
document.addEventListener('click', e => { if (!$('searchWrap').contains(e.target)) acDropdown.classList.remove('open'); });

/* ──────────────────────────────────────────────────────────────
   Watchlist actions
────────────────────────────────────────────────────────────── */
async function addToWatchlist(ticker, name) {
  acDropdown.classList.remove('open'); searchInput.value = '';
  try { const entry = await api('POST', '/api/watchlist', { ticker, name }); if (!state.watchlist.find(w=>w.ticker===entry.ticker)) state.watchlist.push(entry); renderWatchlist(); setStatus(`Added ${ticker} to watchlist`); }
  catch(err) { setStatus(`Failed to add ${ticker}: ${err.message}`); }
}
$('wlList').addEventListener('click', async e => {
  const removeBtn = e.target.closest('.wl-remove');
  if (removeBtn) {
    const ticker = removeBtn.dataset.ticker;
    try { await api('DELETE', `/api/watchlist/${ticker}`); state.watchlist=state.watchlist.filter(w=>w.ticker!==ticker); renderWatchlist(); setStatus(`Removed ${ticker} from watchlist`); }
    catch(err) { setStatus(`Failed to remove: ${err.message}`); }
    return;
  }
  const fundBtn = e.target.closest('.wl-fund-btn');
  if (fundBtn) { openFundamentals(fundBtn.dataset.ticker); }
});

/* ──────────────────────────────────────────────────────────────
   Telegram toggle
────────────────────────────────────────────────────────────── */
$('tgToggle').addEventListener('change', async e => {
  const enabled = e.target.checked;
  try { const s = await api('PUT', '/api/settings', { telegram_enabled: enabled }); state.settings = s; setStatus(`Telegram ${enabled?'enabled':'disabled'}`); }
  catch(err) { e.target.checked = !enabled; setStatus('Failed to update settings'); }
});

/* ──────────────────────────────────────────────────────────────
   Analyse Now / Refresh Now
────────────────────────────────────────────────────────────── */
$('analyzeBtn').addEventListener('click', async () => {
  if (state.analyzing) return;
  if (!state.watchlist.length) { setStatus('Add stocks to watchlist first', false, 'watchlist'); return; }
  state.analyzing = true;
  const btn = $('analyzeBtn'); btn.classList.add('spinning'); btn.disabled = true;
  setStatus(`Analysing ${state.watchlist.length} stock(s)…`, true, 'watchlist');
  try { await api('POST', '/api/analyze'); }
  catch(err) { setStatus(`Failed: ${err.message}`, false, 'watchlist'); btn.classList.remove('spinning'); btn.disabled=false; state.analyzing=false; }
});

$('refreshScheduledBtn').addEventListener('click', async () => {
  if (state.refreshing) return;
  state.refreshing = true;
  const btn = $('refreshScheduledBtn'); btn.classList.add('spinning'); btn.disabled = true;
  setScheduledStatus('Starting scheduled scan…', true);
  try { await api('POST', '/api/analyze/scheduled'); }
  catch(err) { setScheduledStatus(`Failed: ${err.message}`, false); btn.classList.remove('spinning'); btn.disabled=false; state.refreshing=false; }
});

/* ──────────────────────────────────────────────────────────────
   Stop / Resume
────────────────────────────────────────────────────────────── */
function setBotStopped(stopped) {
  state.botStopped = stopped;
  const btn = $('stopBtn');
  if (stopped) { btn.className='btn success'; btn.innerHTML='<span>▶</span> Resume Bot'; }
  else         { btn.className='btn danger';  btn.innerHTML='<span>⏹</span> Stop Bot'; }
}
$('stopBtn').addEventListener('click', async () => {
  try {
    if (!state.botStopped) {
      await api('POST', '/api/bot/stop');
      setStatus('Bot stopped', false, 'all'); setStatus('Bot stopped', false, 'watchlist'); setScheduledStatus('Bot stopped', false);
      const ab=$('analyzeBtn'); ab.classList.remove('spinning'); ab.disabled=false; state.analyzing=false;
      const rb=$('refreshScheduledBtn'); rb.classList.remove('spinning'); rb.disabled=false; state.refreshing=false;
    } else {
      await api('POST', '/api/bot/resume');
      setStatus('Bot resumed', false, 'all'); setStatus('Ready', false, 'watchlist'); setScheduledStatus('Ready', false);
    }
  } catch(err) { setStatus(`Failed: ${err.message}`); }
});

/* ──────────────────────────────────────────────────────────────
   Boot
────────────────────────────────────────────────────────────── */
async function boot() {
  setStatus('Loading…', true);
  try {
    const [signals, watchlist, settings, botSt] = await Promise.all([
      api('GET', '/api/signals'),
      api('GET', '/api/watchlist'),
      api('GET', '/api/settings'),
      api('GET', '/api/bot/status'),
    ]);
    state.signals   = signals;
    state.watchlist = watchlist;
    state.settings  = settings;
    $('tgToggle').checked = !!settings.telegram_enabled;
    setBotStopped(botSt.stopped);
    renderWatchlist();
    renderSignals();
    setStatus('Ready');
  } catch(err) {
    setStatus(`Load failed: ${err.message}`);
  } finally {
    $('statusBar').classList.remove('busy');
  }
  connectWS();
}

/* ══════════════════════════════════════════════════════════════
   FUNDAMENTAL ANALYSIS — modal open / render
══════════════════════════════════════════════════════════════ */

function openFundamentals(ticker) {
  // Reset modal to loading state
  $('fundOverlay').classList.add('open');
  $('fundTicker').textContent  = ticker;
  $('fundCompany').textContent = '';
  $('fundSector').textContent  = '';
  $('fundScore').textContent   = '—';
  $('fundScore').className     = 'fund-score-val';
  $('fundPriceRow').textContent = '';
  $('fundBody').innerHTML      = '<div class="fund-loading">⏳ Fetching fundamentals from Yahoo Finance…</div>';

  fetch(`/api/fundamentals/${ticker}`)
    .then(r => r.json())
    .then(data => renderFundamentals(data))
    .catch(err => {
      $('fundBody').innerHTML = `<div class="fund-error">❌ Failed to load: ${err.message}</div>`;
    });
}

function closeFundamentals() {
  $('fundOverlay').classList.remove('open');
}

$('fundCloseBtn').addEventListener('click', closeFundamentals);
$('fundOverlay').addEventListener('click', e => { if (e.target === $('fundOverlay')) closeFundamentals(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeFundamentals(); });

function fmtVal(v, suffix='', na='—') {
  if (v === null || v === undefined) return `<span class="fund-cell-val muted">${na}</span>`;
  return `<span class="fund-cell-val">${v}${suffix}</span>`;
}

function fmtFundPct(v, na='—') {
  if (v === null || v === undefined) return `<span class="fund-cell-val muted">${na}</span>`;
  const n = parseFloat(v);
  const cls = n > 0 ? 'pos' : n < 0 ? 'neg' : '';
  return `<span class="fund-cell-val ${cls}">${v}</span>`;
}

function fundCell(label, valHtml, sub='') {
  return `<div class="fund-cell">
    <div class="fund-cell-label">${label}</div>
    ${valHtml}
    ${sub ? `<div class="fund-cell-sub">${sub}</div>` : ''}
  </div>`;
}

function renderFundamentals(d) {
  if (d.error) {
    $('fundBody').innerHTML = `<div class="fund-error">❌ ${d.error}<br><br>
      <button class="fund-refresh-btn" onclick="openFundamentals('${d.ticker||''}')">Retry</button></div>`;
    return;
  }

  // Header
  $('fundTicker').textContent  = d.ticker;
  $('fundCompany').textContent = d.name || '';
  $('fundSector').textContent  = [d.sector, d.currency ? d.currency + ' listed' : ''].filter(Boolean).join(' · ');

  // Quality score
  const qs = d.quality_score;
  if (qs !== null && qs !== undefined) {
    $('fundScore').textContent = qs.toFixed(0);
    $('fundScore').className   = 'fund-score-val ' + (qs >= 60 ? 'high' : qs >= 35 ? 'mid' : 'low');
  }

  // Current price
  const tech = d.technicals || {};
  if (tech.current_price) {
    $('fundPriceRow').textContent = `Current: ${tech.current_price}`;
  }

  const val  = d.valuation  || {};
  const inc  = d.income     || {};
  const bal  = d.balance    || {};
  const div  = d.dividends  || {};

  // 52-week bar
  let wk52Bar = '';
  if (tech.wk52_position_pct !== null && tech.wk52_position_pct !== undefined) {
    wk52Bar = `<div class="fund-bar-wrap"><div class="fund-bar" style="width:${tech.wk52_position_pct}%"></div></div>
    <div class="fund-cell-sub">${tech.wk52_position_pct}% of 52W range</div>`;
  }

  $('fundBody').innerHTML = `

    <!-- Valuation -->
    <div class="fund-section">
      <div class="fund-section-title">📈 Valuation</div>
      <div class="fund-grid">
        ${fundCell('Market Cap',    fmtVal(val.market_cap_fmt))}
        ${fundCell('P/E (Trailing)',fmtVal(val.trailing_pe),  val.forward_pe ? `Forward: ${val.forward_pe}` : '')}
        ${fundCell('Price / Book',  fmtVal(val.price_to_book))}
        ${fundCell('EV / EBITDA',   fmtVal(val.ev_to_ebitda))}
        ${fundCell('Enterprise Value', fmtVal(val.ev_fmt))}
      </div>
    </div>

    <!-- Income -->
    <div class="fund-section">
      <div class="fund-section-title">💰 Income (TTM)</div>
      <div class="fund-grid">
        ${fundCell('Revenue',       fmtVal(inc.revenue_fmt))}
        ${fundCell('Net Income',    fmtVal(inc.net_income_fmt))}
        ${fundCell('EPS',           fmtVal(inc.eps_trailing),  inc.eps_forward ? `Forward: ${inc.eps_forward}` : '')}
        ${fundCell('Net Margin',    fmtFundPct(inc.net_margin_pct))}
        ${fundCell('Gross Margin',  fmtFundPct(inc.gross_margin_pct))}
        ${fundCell('Op. Margin',    fmtFundPct(inc.operating_margin_pct))}
        ${fundCell('Revenue Growth YoY', fmtFundPct(inc.revenue_growth_pct))}
        ${fundCell('Earnings Growth YoY', fmtFundPct(inc.earnings_growth_pct))}
      </div>
    </div>

    <!-- Balance Sheet -->
    <div class="fund-section">
      <div class="fund-section-title">🏦 Balance Sheet</div>
      <div class="fund-grid">
        ${fundCell('Debt / Equity',   fmtVal(bal.debt_to_equity))}
        ${fundCell('Current Ratio',   fmtVal(bal.current_ratio))}
        ${fundCell('Book Value/Share',fmtVal(bal.book_value_per_share))}
        ${fundCell('ROE',             fmtFundPct(bal.roe_pct))}
        ${fundCell('ROA',             fmtFundPct(bal.roa_pct))}
        ${fundCell('Free Cash Flow',  fmtVal(bal.free_cashflow_fmt))}
      </div>
    </div>

    <!-- Dividends -->
    <div class="fund-section">
      <div class="fund-section-title">💎 Dividends</div>
      <div class="fund-grid">
        ${fundCell('Dividend Yield',  fmtFundPct(div.yield_pct))}
        ${fundCell('Annual DPS',      fmtVal(div.annual_dps))}
        ${fundCell('Payout Ratio',    fmtFundPct(div.payout_ratio_pct))}
        ${fundCell('Ex-Dividend Date',fmtVal(div.ex_dividend_date))}
      </div>
    </div>

    <!-- Technicals -->
    <div class="fund-section">
      <div class="fund-section-title">📉 Technicals</div>
      <div class="fund-grid">
        <div class="fund-cell">
          <div class="fund-cell-label">52-Week Range</div>
          <span class="fund-cell-val">${tech.wk52_low ?? '—'} – ${tech.wk52_high ?? '—'}</span>
          ${wk52Bar}
        </div>
        ${fundCell('Beta',          fmtVal(tech.beta))}
        ${fundCell('Avg Vol (10d)', fmtVal(tech.avg_volume_10d ? Number(tech.avg_volume_10d).toLocaleString() : null))}
      </div>
    </div>

    <div style="text-align:right;font-size:11px;color:var(--muted);margin-top:4px">
      Source: Yahoo Finance · Cached 24h ·
      <button class="fund-refresh-btn" onclick="clearAndRefetch('${d.ticker}')">Force refresh</button>
    </div>
  `;
}

async function clearAndRefetch(ticker) {
  $('fundBody').innerHTML = '<div class="fund-loading">⏳ Clearing cache and refreshing…</div>';
  try {
    await fetch(`/api/fundamentals/cache/${ticker}`, { method: 'DELETE' });
  } catch(_) {}
  openFundamentals(ticker);
}

boot();
</script>
